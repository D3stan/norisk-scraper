<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NoRisk Admin</title>
    <link rel="stylesheet" href="/admin/static/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>NoRisk Admin</h1>
            <div class="header-actions">
                <button id="exportBtn" class="btn-secondary">Esporta CSV</button>
                <button id="changePasswordBtn" class="btn-secondary">Cambia Password</button>
                <button id="logoutBtn" class="btn-secondary">Logout</button>
            </div>
        </header>

        <main class="admin-main">
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Cerca per nome, email, codice...">
                <select id="dateFilter">
                    <option value="">Tutte le date</option>
                    <option value="today">Oggi</option>
                    <option value="week">Ultimi 7 giorni</option>
                    <option value="month">Ultimo mese</option>
                </select>
                <button id="searchBtn" class="btn-primary">Cerca</button>
            </div>

            <div class="table-container">
                <table class="submissions-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Nome Cognome / Ragione Sociale</th>
                            <th>Email</th>
                            <th>Telefono</th>
                            <th>Codice Preventivo</th>
                        </tr>
                    </thead>
                    <tbody id="submissionsTable">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content modal-small">
            <span class="modal-close password-modal-close">&times;</span>
            <div id="passwordModalBody">
                <h2>Cambia Password</h2>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="currentPassword">Password Attuale</label>
                        <input type="password" id="currentPassword" name="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Nuova Password</label>
                        <input type="password" id="newPassword" name="newPassword" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Conferma Nuova Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
                    </div>
                    <button type="submit" class="btn-primary">Cambia Password</button>
                    <div id="passwordMessage" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="/admin/static/admin.js"></script>
</body>
</html>
