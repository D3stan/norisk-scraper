    <input type="hidden" name="_token" value="zFbRY2LLVVz4ixtuyRXy8JdShJcptQOgjQhYmfCO">

    <!-- ADVISER DATA SECTION -->

        <legend>The event</legend>

        <div>

            <label for="type">Type of event</label>

                <option value="">Please select...</option>

        <div>
            <label for="start">First day</label>
            <!-- Date picker component (calendar with ~0 day buttons omitted) -->
            <input type="text" name="start" placeholder="Select date">
        </div>

        <div>
            <label for="days">Number of days</label>
            <input type="number" name="days">
        </div>

        <div>
            <label for="visitors">Number of visitors</label>
            <input type="number" name="visitors">
        </div>

        <div>
            <label for="description">Description</label>
            <textarea name="description"></textarea>
        </div>
    </fieldset>

    <!-- LOCATION SECTION -->
    <fieldset>
        <legend>The location</legend>

        <div>
            <label for="venue_description">Venue</label>
            <input type="text" name="venue_description">
        </div>

        <div>
            <label for="address">Address</label>
            <input type="text" name="address">
        </div>

        <div>
            <label for="house_number">Number</label>
            <input type="text" name="house_number">
        </div>

        <div>
            <label for="zipcode">Zipcode</label>
            <input type="text" name="zipcode">
        </div>

        <div>
            <label for="city">City</label>
            <input type="text" name="city">
        </div>

        <div>
            <label for="region">Country</label>
            <select name="region">
                <option value="">Please select...</option>
                <!-- 192 countries (examples: nl, be, de, se, af, al, dz...) -->
            </select>
        </div>

        <div>
            <label for="environment">Environment</label>
            <select name="environment">
                <option value="">Please select...</option>
                <option value="indoor">Indoor</option>
                <option value="outdoor">Outdoor</option>
                <option value="both">Both in- and outdoor</option>
            </select>
        </div>
    </fieldset>

    <button type="submit">Next</button>
</form>
