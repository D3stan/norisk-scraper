<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Risk - Cleaned Form</title>
    <!-- Simplified Tailwind for layout understanding -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4">

<!-- Core Form Logic -->
<!-- Action URL matches the original form's submission endpoint -->
<form action="https://verzekeren.norisk.eu/en/embed/product/event-int?key=73c7fe1a-5b9c-48bc-870d-61315d03a30c" method="post">
    
    <!-- CRITICAL: CSRF Token. This changes per session. -->
    <input type="hidden" name="_token" value="mv0vXVjJXdzvXyFNaiLjm9cPq9FJS8S6hwZX9n8M" autocomplete="off">
    
    <!-- ========================================== -->
    <!-- STEP 1: Personal Details ("Who are you") -->
    <!-- ========================================== -->
    <fieldset class="mb-8 border p-4 rounded">
        <legend class="text-xl font-bold mb-4">Who are you</legend>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label for="initials" class="block font-medium">Initials</label>
                <input type="text" id="initials" name="initials" class="border w-full p-2 rounded">
            </div>
            <div>
                <label for="preposition" class="block font-medium">Preposition</label>
                <input type="text" id="preposition" name="preposition" class="border w-full p-2 rounded">
            </div>
            <div class="md:col-span-2">
                <label for="last_name" class="block font-medium">Last name</label>
                <input type="text" id="last_name" name="last_name" class="border w-full p-2 rounded">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div>
                <label for="phone" class="block font-medium">Phone</label>
                <input type="tel" id="phone" name="phone" class="border w-full p-2 rounded">
            </div>
            <div>
                <label for="email" class="block font-medium">Email</label>
                <input type="email" id="email" name="email" class="border w-full p-2 rounded">
            </div>
        </div>

        <!-- Livewire Component: Role Selection -->
        <!-- Note: This was a dynamic Livewire component. Simplified to standard select. -->
        <div class="mt-4">
            <label class="block font-medium">What is your role?</label>
            <select name="data[role]" id="data.role" class="border w-full p-2 rounded">
                <option value="">Please select...</option>
                <option value="event_organiser">Event Organisor</option>
                <option value="intermediary">Intermediary</option>
                <option value="proxy">Affiliated Intermediary</option>
                <option value="other">Other</option>
            </select>
        </div>
    </fieldset>

    <hr class="my-6">

    <!-- ========================================== -->
    <!-- STEP 2: Event Details ("The event") -->
    <!-- ========================================== -->
    <fieldset class="mb-8 border p-4 rounded">
        <legend class="text-xl font-bold mb-4">The event</legend>
        <p class="mb-4 text-sm text-gray-600">Please answer the questions below, we need this information to estimate the risk, calculate the premium and make the offer.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="title" class="block font-medium">Reference (Event Name)</label>
                <input type="text" id="title" name="title" class="border w-full p-2 rounded">
            </div>

            <!-- Event Type Selector -->
            <div>
                <label for="type" class="block font-medium">Type of event</label>
                <select name="type" id="type" class="border w-full p-2 rounded">
                    <option value="">Please select...</option>
                    <option value="8">Wedding</option>
                    <option value="11">Concert</option>
                    <option value="12">Conference</option>
                    <option value="17">Party</option>
                    <option value="18">Festival</option>
                    <option value="48">Sports event</option>
                    <!-- [Truncated for brevity: contains IDs 1-56, 64] -->
                    <option value="0">Other</option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <label for="start" class="block font-medium">First day</label>
            <!-- Original used a complex JS date picker. Simplified to standard date input. -->
            <input type="date" id="start" name="start" class="border w-full p-2 rounded">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div>
                <label for="days" class="block font-medium">Number of days</label>
                <input type="number" id="days" name="days" class="border w-full p-2 rounded">
            </div>
            <div>
                <label for="visitors" class="block font-medium">Total number of visitors over all days</label>
                <input type="number" id="visitors" name="visitors" class="border w-full p-2 rounded">
            </div>
        </div>

        <div class="mt-4">
            <label for="description" class="block font-medium">Short event description</label>
            <textarea id="description" name="description" rows="2" class="border w-full p-2 rounded"></textarea>
        </div>
    </fieldset>

    <!-- ========================================== -->
    <!-- STEP 3: Location Details ("The location") -->
    <!-- ========================================== -->
    <fieldset class="mb-8 border p-4 rounded">
        <legend class="text-xl font-bold mb-4">The location</legend>

        <div class="mb-4">
            <label for="venue_description" class="block font-medium">Briefly describe the location</label>
            <textarea id="venue_description" name="venue_description" rows="2" class="border w-full p-2 rounded"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2">
                <label for="address" class="block font-medium">Address</label>
                <input type="text" id="address" name="address" class="border w-full p-2 rounded">
            </div>
            <div>
                <label for="house_number" class="block font-medium">House number</label>
                <input type="text" id="house_number" name="house_number" class="border w-full p-2 rounded">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div>
                <label for="zipcode" class="block font-medium">Zipcode</label>
                <input type="text" id="zipcode" name="zipcode" class="border w-full p-2 rounded">
            </div>
            <div class="md:col-span-2">
                <label for="city" class="block font-medium">City</label>
                <input type="text" id="city" name="city" class="border w-full p-2 rounded">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
            <div>
                <label for="region" class="block font-medium">Country</label>
                <!-- Original was a custom UI Select. Simplified to standard Select. -->
                <select name="region" id="region" class="border w-full p-2 rounded">
                    <!-- Truncated list for readability -->
                    <option value="nl ">Netherlands</option>
                    <option value="be ">Belgium</option>
                    <option value="de ">Germany</option>
                    <option value="gb">United Kingdom</option>
                    <option value="us">United States</option>
                    <option value="it">Italy</option> <!-- Note: Added manually for completeness -->
                    <!-- ... [200+ other countries] ... -->
                </select>
            </div>
            <div>
                <label for="environment" class="block font-medium">Indoor/outdoor</label>
                <select name="environment" id="environment" class="border w-full p-2 rounded">
                    <option value="">Please select...</option>
                    <option value="indoor">Indoor</option>
                    <option value="outdoor">Outdoor</option>
                    <option value="both">Both in- and outdoor</option>
                </select>
            </div>
        </div>
    </fieldset>

    <div class="flex justify-end">
        <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-6 rounded hover:bg-blue-700">
            Next step, what to cover
        </button>
    </div>

</form>

</body>
</html>
